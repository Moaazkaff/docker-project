version: "3.8"

services:
  frontend:
    image: nginx:latest
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - frontend-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://user:password@database:5432/myapp
    networks:
      - backend-network
      - frontend-network
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "wget" , "-q" , "-O-" , "http://localhost:3001//api/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s


  database:
    image: postgres:15-alpine
    container_name: database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=myapp
    volumes:
      - db-volume:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    



networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true






volumes:
  db-volume:
  